baseURL: 'https://gavinsdavies.com/'

# Required for Tailwind v4 CSS generation — writes hugo_stats.json
build:
  writeStats: true
title: Gavin S. Davies
copyright: '© {year} Gavin S. Davies'

# Language
locale: en-us

# Content
enableEmoji: true
enableGitInfo: false
summaryLength: 30

# Security
enableInlineShortcodes: false

# Pagination
pagination:
  pagerSize: 10

# Taxonomies
taxonomies:
  tag: tags
  category: categories
  author: authors

# Outputs — required by Hugo Blox
outputs:
  home:
    - HTML
    - RSS
    - WebAppManifest
    - headers
    - redirects
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS

# Image processing
imaging:
  resampleFilter: lanczos
  quality: 80
  anchor: smart

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 3
